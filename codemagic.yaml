workflows:
  default-workflow:
    name: Flutter
    max_build_duration: 60
    environment:
      flutter: beta
      xcode: latest
      cocoapods: default
      vars:
        TEST_ENV: Encrypted(Z0FBQUFBQmZkOEhWSVl0b3BNdnZZbHdyRVdSdmFvbTFYdUFzaF91blpiSnVXRlRfV256MXdtTThvVGM2ZXFEMzhrajBHTEZMZTFvejZ5Tm1ZUXMwSFV1eE1TWVcya0xnUlE9PQ==)
        GIT_CRYPT_KEY: Encrypted()
    scripts:
      - echo $TEST_ENV
      - HOMEBREW_NO_AUTO_UPDATE=1 brew install git-crypt
      - echo "$GIT_CRYPT_KEY" | base64 --decode > ./git-crypt-key && git-crypt unlock ./git-crypt-key && rm ./git-crypt-key
      - |
        # set up debug keystore
        rm -f ~/.android/debug.keystore
        keytool -genkeypair \
          -alias androiddebugkey \
          -keypass android \
          -keystore ~/.android/debug.keystore \
          -storepass android \
          -dname 'CN=Android Debug,O=Android,C=US' \
          -keyalg 'RSA' \
          -keysize 2048 \
          -validity 10000
      - |
        # set up local properties
        echo "flutter.sdk=$HOME/programs/flutter" > "$FCI_BUILD_DIR/apps/green_walking/android/local.properties"
      - cd apps/green_walking && flutter packages pub get
      - cd apps/green_walking && flutter build apk --debug
    artifacts:
      - apps/green_walking/build/**/outputs/**/*.apk
      - apps/green_walking/build/**/outputs/**/*.aab
      - apps/green_walking/build/**/outputs/**/mapping.txt
      - apps/green_walking/flutter_drive.log
    publishing:
      email:
        recipients:
          - code@xennis.org
